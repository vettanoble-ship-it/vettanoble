<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">

  <!-- Fondo verde oscuro (formato cuadrado para redes) -->
  <rect width="320" height="320" fill="#1C3A2A"/>

  <!-- Marco sutil interior -->
  <rect x="18" y="18" width="284" height="284" fill="none" stroke="#F5EDD8" stroke-width="0.6" opacity="0.25"/>

  <!-- ===== ÁRBOL LINE-ART ===== -->

  <!-- Tronco principal -->
  <line x1="160" y1="205" x2="160" y2="105" stroke="#F5EDD8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ramas inferiores -->
  <line x1="160" y1="185" x2="110" y2="165" stroke="#F5EDD8" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="210" y2="165" stroke="#F5EDD8" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="165" x2="90"  y2="152" stroke="#F5EDD8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="210" y1="165" x2="230" y2="152" stroke="#F5EDD8" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Ramas medias -->
  <line x1="160" y1="162" x2="118" y2="145" stroke="#F5EDD8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="160" y1="162" x2="202" y2="145" stroke="#F5EDD8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="145" x2="100" y2="134" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="202" y1="145" x2="220" y2="134" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Ramas superiores -->
  <line x1="160" y1="140" x2="128" y2="126" stroke="#F5EDD8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="140" x2="192" y2="126" stroke="#F5EDD8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="126" x2="112" y2="118" stroke="#F5EDD8" stroke-width="1" stroke-linecap="round"/>
  <line x1="192" y1="126" x2="208" y2="118" stroke="#F5EDD8" stroke-width="1" stroke-linecap="round"/>

  <!-- Ramas casi en la punta -->
  <line x1="160" y1="120" x2="142" y2="111" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="160" y1="120" x2="178" y2="111" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Punta del árbol -->
  <circle cx="160" cy="104" r="2.5" fill="#F5EDD8"/>

  <!-- Raíces -->
  <line x1="160" y1="205" x2="142" y2="215" stroke="#F5EDD8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="160" y1="205" x2="178" y2="215" stroke="#F5EDD8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="142" y1="215" x2="132" y2="220" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="178" y1="215" x2="188" y2="220" stroke="#F5EDD8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ===== TEXTO ===== -->
  <line x1="60" y1="248" x2="260" y2="248" stroke="#F5EDD8" stroke-width="0.7" opacity="0.4"/>

  <text
    x="160" y="278"
    font-family="'Georgia', 'Palatino Linotype', serif"
    font-size="22" font-weight="bold" letter-spacing="7"
    fill="#F5EDD8" text-anchor="middle">VETTA NOBLE</text>

</svg>
